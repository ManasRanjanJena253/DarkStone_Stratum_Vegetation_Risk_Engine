services:

  # FastAPI Backend
  api:
    build: .
    container_name: core_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      user_db:
        condition: service_healthy
      analysis_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - core_network
    restart: unless-stopped

  # Alembic migration runner (exits after completion)
  migrate:
    build: .
    container_name: core_migrate
    command: >
      sh -c "
        echo 'Waiting for databases...' &&
        sleep 5 &&
        python -m app.scripts.init_db &&
        alembic upgrade head
      "
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      user_db:
        condition: service_healthy
      analysis_db:
        condition: service_healthy
    networks:
      - core_network
    restart: "no"

  # Celery Worker
  worker:
    build: .
    container_name: core_celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - user_db
      - analysis_db
    networks:
      - core_network
    restart: unless-stopped

  # Nginx - serves frontend static files and proxies /api/* to FastAPI
  frontend:
    image: nginx:alpine
    container_name: core_frontend
    ports:
      - "3000:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - core_network
    restart: unless-stopped

  # User Database (plain Postgres)
  user_db:
    image: postgres:15-alpine
    container_name: core_user_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user_db
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core_network
    restart: unless-stopped

  # Analysis Database (PostGIS)
  analysis_db:
    image: postgis/postgis:15-3.3-alpine
    container_name: core_analysis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: analysis_db
      POSTGRES_DB: analysis_db
    ports:
      - "5433:5432"
    volumes:
      - analysis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core_network
    restart: unless-stopped

  # Redis (Celery broker + result backend + session cache)
  redis:
    image: redis:7-alpine
    container_name: core_redis
    ports:
      - "6379:6379"
    networks:
      - core_network
    restart: unless-stopped

volumes:
  user_postgres_data:
  analysis_postgres_data:

networks:
  core_network:
    driver: bridge